services:
  backend:
    image: ghcr.io/cottons29/job-portal-group-12/backend:latest
    container_name: job_portal_backend
    restart: always
    env_file:
      - .env
    environment:
      PORT: 3080
    ports:
      - "3080:3080"

  frontend:
    image: ghcr.io/cottons29/job-portal-group-12/frontend:latest
    container_name: job_portal_frontend
    restart: always
    ports:
      - "3081:80"
    depends_on:
      - backend

  progress_book:
    build:
      context: ./progress_book
      dockerfile: Dockerfile
    image: ghcr.io/cottons29/job-portal-group-12/progress_book:latest
    container_name: job_portal_progress_book
    restart: always
    ports:
      - "3082:80"

volumes:
  postgres_data:
