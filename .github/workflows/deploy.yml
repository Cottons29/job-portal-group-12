name: Build and Deploy with Podman

on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image repository name
        run: echo "IMAGE_REPOSITORY=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/${{ env.IMAGE_REPOSITORY }}/backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.FRONTEND_API_URL }}
          tags: ghcr.io/${{ env.IMAGE_REPOSITORY }}/frontend:latest

      - name: Deploy to server with SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.INPUT_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GITHUB_REPOSITORY,GITHUB_ACTOR,GHCR_TOKEN
          script: |
            set -e
            cd ${{ secrets.SERVER_PATH }}
            git pull origin main
            podman login ghcr.io -u "$GITHUB_ACTOR" -p "$GHCR_TOKEN"
            podman-compose pull backend frontend
            podman-compose up -d
            podman image prune -f
        env:
          GITHUB_REPOSITORY: ${{ env.IMAGE_REPOSITORY }}
          GITHUB_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}