name: Build and Deploy with Podman

on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04-arm

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image repository name
        run: echo "IMAGE_REPOSITORY=$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          platforms: linux/arm64
          tags: ghcr.io/${{ env.IMAGE_REPOSITORY }}/backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/arm64
          build-args: |
            VITE_API_URL=${{ secrets.FRONTEND_API_URL }}
          tags: ghcr.io/${{ env.IMAGE_REPOSITORY }}/frontend:latest

      - name: Deploy to server with SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GITHUB_REPOSITORY,GITHUB_ACTOR,GHCR_TOKEN
          script: |
            cd ${{ secrets.SERVER_PATH }}
            podman-compose up -d --pull always
        env:
          GITHUB_REPOSITORY: ${{ env.IMAGE_REPOSITORY }}
          GITHUB_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}